name: Publish to npm

# Triggered by pushing a semver tag like v1.0.1, v1.2.0, v2.0.0-beta.1, etc.
# The job verifies that package.json's version field matches the tag before
# running `npm publish`, so a mistyped tag is a hard fail rather than an
# accidental wrong-version publish.
#
# Security notes:
# - `github.ref_name` (the tag name) is piped through an `env:` block
#   as $TAG_REF instead of being interpolated directly into a `run:`
#   shell line, so a malicious tag name cannot break out of quoting.
#   See the SAFE pattern in
#   https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# - NPM_TOKEN is passed via env and echoed into a workspace-local
#   .npmrc, which is removed in the `Clean up` step even on failure.
# - Tag pushes aren't covered by branch protection on `main`, so only
#   principals who can push to the repo can trigger this workflow.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish @keepur/beekeeper to npm
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches tag
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG_REF#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag '$TAG_REF' maps to version '$TAG_VERSION' but package.json is at '$PKG_VERSION'"
            echo "bump package.json first (e.g. 'npm version patch') and re-tag"
            exit 1
          fi
          echo "version check passed: $PKG_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc

      - name: Publish
        run: npm publish --access public

      - name: Clean up .npmrc
        if: always()
        run: rm -f .npmrc
