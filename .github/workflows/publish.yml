name: Publish to npm

# Triggered by pushing a semver tag like v1.0.1, v1.2.0, v2.0.0-beta.1, etc.
# The job verifies that package.json's version field matches the tag before
# running `npm publish`, so a mistyped tag is a hard fail rather than an
# accidental wrong-version publish.
#
# Security / auth notes:
# - `github.ref_name` (the tag name) is piped through an `env:` block
#   as $TAG_REF instead of being interpolated directly into a `run:`
#   shell line, so a malicious tag name cannot break out of quoting.
#   See the SAFE pattern in
#   https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# - npm auth comes from the `NPM_TOKEN` repo secret. The "Configure npm
#   auth" step writes it to a workspace-local `.npmrc` immediately
#   before `npm publish`, which scopes the credential to one job and
#   never touches the runner's `~/.npmrc`. The token is an npm
#   "Automation" type so 2FA prompts don't block CI. Rotate by
#   re-issuing on npmjs.com → Access Tokens and updating the secret
#   via `gh secret set NPM_TOKEN`.
#   Background: this replaced ambient `~/.npmrc` auth on 2026-04-25
#   after the runner's long-lived login silently expired between v1.0.1
#   and v1.0.2 (npm returns 404 on expired scope auth, not 401, which
#   was a confusing first failure mode).
# - Tag pushes aren't covered by branch protection on `main`, so only
#   principals who can push to the repo can trigger this workflow.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish @keepur/beekeeper to npm
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches tag
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG_REF#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag '$TAG_REF' maps to version '$TAG_VERSION' but package.json is at '$PKG_VERSION'"
            echo "bump package.json first (e.g. 'npm version patch') and re-tag"
            exit 1
          fi
          echo "version check passed: $PKG_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi
          # Workspace-local .npmrc — scoped to this job, gone after teardown.
          # Single-quoted heredoc so the token isn't interpolated at write time.
          umask 077
          printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_TOKEN}" > .npmrc

      - name: Publish
        run: npm publish --access public
